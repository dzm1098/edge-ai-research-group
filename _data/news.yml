- date: "Feb 2026"
  title: "Hardik Sharma receives the Mitacs Globalink Research Award"
  content: >
    Hardik Sharma was awarded the Mitacs Globalink Research Award to Canada.
    Congratulations, Hardik, and thanks to
    [Dr. Bagesh Kumar](https://jaipur.manipal.edu/fosta/faculty-details.php?url=313/)
    for the support.

- date: "Jan 2026"
  title: "LLM Shepherding paper released"
  content: >
    We shared our work on cost-efficient SLM inference:
    [Pay for Hints, Not Answers: LLM Shepherding for Cost-Efficient Inference](https://arxiv.org/abs/2601.22132).

- date: "Dec 2025"
  title: "INFOCOM 2026 acceptance"
  content: >
    *Hierarchical Inference with an Offload Queue* was accepted to INFOCOM
    2026. Congratulations to Srinivas and collaborators Parimal Parag and
    Ganesh Ayalvadi.

- date: "Nov 2025"
  title: "AAAI 2026 acceptance"
  content: >
    [Inference Offloading for Cost-Sensitive Binary Classification at the Edge](https://arxiv.org/abs/2509.15674)
    was accepted to AAAI 2026.

- date: "Oct 2025"
  title: "2D-AoI accepted to IEEE TCOM"
  content: >
    [2D-AoI: Age-of-Information of Distributed Sensors for Spatio-Temporal Processes](https://drive.google.com/file/d/1vfKZjl41aBOIJT7FAjeIf3pDXMPIJ0v7/view?usp=drive_link)
    was accepted to IEEE TCOM.

- date: "Sep 2025"
  title: "Yuan Lyu and Ziming Dong join the group"
  content: >
    Yuan Lyu joined as a PhD student and Ziming Dong joined as a Master's
    student. Welcome to the group.

- date: "Jul 2025"
  title: "IEEE Senior Member elevation"
  content: >
    Jaya Prakash Champati was elevated to IEEE Senior Member.

- date: "Jun 2025"
  title: "IEEE IoT Journal acceptance"
  content: >
    [Exploring the Boundaries of On-Device Inference: When Tiny Falls Short, Go Hierarchical](https://arxiv.org/abs/2407.11061)
    was accepted to IEEE IoT Journal.

- date: "Jun 2025"
  title: "Survey on LLM routing and hierarchical inference"
  content: >
    Our survey paper on
    [LLM routing and Hierarchical Inference](https://arxiv.org/abs/2506.06579)
    is available on arXiv.

- date: "May 2025"
  title: "KDD 2025 acceptance"
  content: >
    [Error Bounds for the Network Scale-Up Method](https://arxiv.org/abs/2407.10640)
    was accepted to KDD 2025.

- date: "May 2025"
  title: "UAI 2025 acceptance"
  content: >
    [Online Learning with Stochastically Partitioning Experts](https://drive.google.com/file/d/1CCEm7aW0Jt0Ja6lgMHmpXJN_HVoARM8M/view?usp=sharing)
