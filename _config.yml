# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'jekyll serve'. If you change this file, please restart the server process.

# Site settings
title: Edge AI Research Group
email: jpchampati@uvic.ca
description: >
  Research group led by Jaya Prakash Champati at the University of Victoria.
  We study Edge AI, online learning, Age of Information, and network-aware
  decision systems.
baseurl: "/edge-ai-research-group"
url: "https://dzm1098.github.io"
pi_name: Jaya Prakash Champati
pi_role: Assistant Professor, Computer Science
institution: University of Victoria
location: Victoria, BC, Canada
office: ECS 456
phone: 250-472-5899
google_scholar: https://scholar.google.com/citations?user=9zjERPkAAAAJ&hl=en
current_site_url: https://sites.google.com/site/jayachampati/
repository_url: https://github.com/dzm1098/edge-ai-research-group
hero_image: images/team/jaya-prakash-champati.jpg
tagline: Reliable, robust, and efficient intelligence at the network edge
copyright_year: 2026

include:
  - .htaccess
  - _pages

sass:
  sass_dir: _sass

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false
  parse_block_html: true # default for kramdown is false. This will enable using Markdown links
